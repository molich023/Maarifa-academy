# ================================================================
# MAARIFA ACADEMY — NETLIFY CONFIGURATION
# Handles: Hosting, Identity (OAuth), Forms, Functions, Headers
# ================================================================

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# ── REDIRECTS ──────────────────────────────────────────────────
[[redirects]]
  from   = "/portal"
  to     = "/pages/student-portal.html"
  status = 200

[[redirects]]
  from   = "/enroll"
  to     = "/pages/enroll.html"
  status = 200

[[redirects]]
  from   = "/verify"
  to     = "/pages/verify-certificate.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/pages/admin.html"
  status = 200

[[redirects]]
  from   = "/course/:id"
  to     = "/pages/course.html?id=:id"
  status = 200

# ── SECURITY HEADERS ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://identity.netlify.com https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.youtube.com; connect-src 'self' https://*.netlify.app https://*.netlify.com wss://*.netlify.com;"

# ── CACHING ────────────────────────────────────────────────────
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/pages/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
